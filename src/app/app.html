<style>
    html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #0b0f1a; 
  font-family: sans-serif;
}

main {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding-bottom: 60px;
  overflow: hidden;
}

.beacon {
  position: relative;
  width: 160px;
  height: 160px;
}

@keyframes pulse {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.6;
  }
  100% {
    transform: translate(-50%, -50%) scale(1.2);
    opacity: 0;
  }
}

@keyframes dotPulse {
  0% {
    transform: translate(-50%, -50%) scale(1);
  }
  50% {
    transform: translate(-50%, -50%) scale(1.2);
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
  }
}

.ring {
  position: absolute;
  border: 2px solid rgba(0, 150, 255, 0.35);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: pulse 2s infinite;
  box-shadow: 0 0 25px rgba(0, 150, 255, 0.12);
  filter: blur(0.3px);
}

.r1  { width: 60px;  height: 60px;  animation-delay: 0s; }
.r2  { width: 110px; height: 110px; animation-delay: 0.5s; }


.dot {
  position: absolute;
  width: 14px;
  height: 14px;
  background: #0096ff;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 20px rgba(0, 150, 255, 0.6);
  animation: dotPulse 1.5s infinite;
}
.btn-FF {
  background-color: #0096ff;
  color: white;
  border: none;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
  transition: background-color 0.3s ease;
  position:absolute;
  bottom: 30%;
  right: 675px;
  border-radius: 30px;
  padding: 1px 40px;
}
</style>
<main>
  <div class="beacon">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="dot"></div>
  </div>
  <div>
    <button class="btn-FF">
      <p style="font-size: 16px;">Forward File</p>
    </button>
  </div>
</main>
